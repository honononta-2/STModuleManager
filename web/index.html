<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon-128.png" type="image/png" sizes="128x128">
  <link rel="apple-touch-icon" href="/icon-128.png">
  <title>STModuleManager</title>
  <meta name="description" content="ブループロトコル：スターレゾナンスのモジュール管理・最適化ツール。スクリーンショットからOCRで自動取込、条件を指定してモジュールの最適な組み合わせを探索できます。">
  <meta name="keywords" content="スターレゾナンス,スタレゾ,モジュール,最適化,ブループロトコル,Blue Protocol,Star Resonance,Module,Optimizer">
  <link rel="canonical" href="https://st-module-manager.pages.dev/">
  <meta name="theme-color" content="#f3f3f3">
  <meta property="og:title" content="STModuleManager">
  <meta property="og:description" content="スクショからモジュールを自動取込し、メインステータス・サブステータスの条件を指定して最適な組み合わせを探索できる非公式ツールです。">
  <meta property="og:image" content="https://st-module-manager.pages.dev/icon-512.png">
  <meta property="og:url" content="https://st-module-manager.pages.dev/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="STModuleManager">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:locale:alternate" content="ko_KR">
  <meta property="og:locale:alternate" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="STModuleManager">
  <meta name="twitter:description" content="スクショからモジュールを自動取込し、メインステータス・サブステータスの条件を指定して最適な組み合わせを探索できる非公式ツールです。">
  <meta name="twitter:image" content="https://st-module-manager.pages.dev/icon-512.png">
  <style>.sidebar,.sidebar-bd{visibility:hidden}</style>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div class="app">

  <!-- Web header -->
  <div class="web-header">
    <div class="tab active" data-tab="list" data-i18n="tab_modules">モジュール一覧</div>
    <div class="tab" data-tab="opt" data-i18n="tab_optimize">最適化</div>
    <div style="flex:1"></div>
    <button class="hamburger-btn" id="hamburger-btn" aria-label="メニュー">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

  <!-- Settings sidebar -->
  <div class="sidebar-bd" id="sidebar-bd"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title" data-i18n="settings_title">設定</span>
      <button class="modal-close" id="sidebar-close">&times;</button>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Language</div>
        <div class="lang-options" id="lang-options">
          <label class="lang-option"><input type="radio" name="lang" value="ja"><span>日本語</span></label>
          <label class="lang-option"><input type="radio" name="lang" value="ko"><span>한국어</span></label>
          <label class="lang-option"><input type="radio" name="lang" value="en"><span>English</span></label>
        </div>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- List panel -->
    <div class="panel active" id="panel-list">
      <div class="action-bar">
        <button class="addbtn" id="screenshot-btn" data-i18n="btn_screenshot">スクショ取込</button>
        <button class="speed-info-btn" id="screenshot-info-btn" title="スクショ取込について">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </button>
        <button class="addbtn" id="manual-btn" data-i18n="btn_manual">手動入力</button>
        <button class="addbtn" id="clear-btn" data-i18n="btn_clear">クリア</button>
      </div>
      <div class="cmdbar">
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="filter_label">絞込</span>
          <button class="opt-multi-btn" id="filter-btn">未選択</button>
          <button class="filter-mode-btn" id="filter-mode">AND</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="sort_label">並び替え</span>
          <div id="schips" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
          <button class="addbtn" id="add-s">+ Add</button>
        </div>
      </div>
      <div class="scroll">
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <!-- Optimize panel -->
    <div class="panel" id="panel-opt">
      <div class="cmdbar opt-cmdbar">
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="rarity_label">レアリティ</span>
          <select id="opt-quality" class="opt-select">
            <option value="3" data-i18n="rarity_purple_up">紫以上</option>
            <option value="4" data-i18n="rarity_gold_only">金のみ</option>
          </select>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="main_stat">メインステータス</span>
          <button class="opt-multi-btn" id="opt-btn-req">未選択</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="sub_stat">サブステータス</span>
          <button class="opt-multi-btn" id="opt-btn-des">未選択</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="exclude_stat">対象外</span>
          <button class="opt-multi-btn" id="opt-btn-excl">未選択</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="speed_label">探索速度</span>
          <select id="opt-speed" class="opt-select">
            <option value="standard" data-i18n="speed_standard">標準</option>
            <option value="precise" data-i18n="speed_precise">高精度</option>
            <option value="most_precise" data-i18n="speed_most_precise">最高精度</option>
          </select>
          <button class="speed-info-btn" id="speed-info-btn" title="探索速度について">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          </button>
        </div>
      </div>

      <div class="opt-pattern-bar">
        <span class="cmd-lbl" data-i18n="pattern_label">パターン</span>
        <select id="pattern-select" class="opt-select pattern-select">
          <option value="">-- 選択 --</option>
        </select>
        <button class="addbtn" id="pattern-load" data-i18n="btn_load">読込</button>
        <button class="addbtn" id="pattern-save" data-i18n="btn_save">保存</button>
        <button class="addbtn pattern-del-btn" id="pattern-delete" data-i18n="btn_delete">削除</button>
        <div style="flex:1"></div>
        <button class="opt-run-btn" id="opt-run" disabled data-i18n="btn_run">最適化実行</button>
      </div>

      <div class="scroll" id="opt-scroll">
        <div class="opt-empty" id="opt-empty">
          <div style="font-size:28px;opacity:0.22">◈</div>
          <div>メインステータスを選択して最適化を実行してください</div>
        </div>
        <div class="opt-results" id="opt-results" style="display:none"></div>
      </div>
    </div>

    <!-- 探索速度モーダル -->
    <div class="modal-bd" id="speed-info-bd">
      <div class="modal speed-info-modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="speed_info_title">探索速度について</span>
          <button class="modal-close" id="speed-info-close">&times;</button>
        </div>
        <div class="modal-body" id="speed-info-body"></div>
      </div>
    </div>

    <!-- スクショ取込説明モーダル -->
    <div class="modal-bd" id="screenshot-info-bd">
      <div class="modal speed-info-modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="screenshot_info_title">スクショ取込について</span>
          <button class="modal-close" id="screenshot-info-close">&times;</button>
        </div>
        <div class="modal-body" id="screenshot-info-body"></div>
      </div>
    </div>

    <!-- Result detail modal -->
    <div class="modal-bd" id="modal-bd">
      <div class="modal" id="modal">
        <div class="modal-head">
          <span class="modal-title" id="modal-title" data-i18n="combo_detail">組み合わせ詳細</span>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- OCR confirmation modal -->
    <div class="modal-bd" id="ocr-modal-bd">
      <div class="modal ocr-modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="ocr_title">OCR結果確認</span>
          <button class="modal-close" id="ocr-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="ocr-modal-body"></div>
        <div class="modal-footer">
          <div class="ocr-pager" id="ocr-pager">
            <button class="ocr-pager-btn" id="ocr-prev" disabled>&lsaquo;</button>
            <span class="ocr-pager-info" id="ocr-pager-info">1 / 1</span>
            <button class="ocr-pager-btn" id="ocr-next" disabled>&rsaquo;</button>
          </div>
          <span style="flex:1"></span>
          <button class="addbtn" id="ocr-cancel" data-i18n="btn_cancel">キャンセル</button>
          <button class="opt-run-btn" id="ocr-register" data-i18n="btn_register">登録</button>
        </div>
      </div>
    </div>

    <!-- OCR previous data modal -->
    <div class="modal-bd" id="ocr-prev-modal-bd">
      <div class="modal" style="width:400px">
        <div class="modal-head">
          <span class="modal-title" data-i18n="ocr_prev_data_title">前回の取込データ</span>
          <button class="modal-close" id="ocr-prev-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <p data-i18n="ocr_prev_data_msg">前回の取込データが残っています。復元しますか？</p>
        </div>
        <div class="modal-footer">
          <button class="addbtn" id="ocr-prev-new" data-i18n="ocr_new_import">新規取込</button>
          <button class="opt-run-btn" id="ocr-prev-restore" data-i18n="ocr_restore">復元</button>
        </div>
      </div>
    </div>

    <!-- OCR cancel confirm modal -->
    <div class="modal-bd" id="ocr-cancel-modal-bd">
      <div class="modal" style="width:400px">
        <div class="modal-head">
          <span class="modal-title" data-i18n="ocr_cancel_title">取込データの削除</span>
          <button class="modal-close" id="ocr-cancel-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <p data-i18n="ocr_cancel_msg">取込データを削除します。この操作は元に戻せません。</p>
        </div>
        <div class="modal-footer">
          <button class="addbtn" id="ocr-cancel-back" data-i18n="btn_cancel">キャンセル</button>
          <button class="pattern-del-btn addbtn" id="ocr-cancel-ok" data-i18n="ocr_cancel_confirm">削除</button>
        </div>
      </div>
    </div>

    <!-- Pattern delete confirm modal -->
    <div class="modal-bd" id="patdel-modal-bd">
      <div class="modal" style="width:400px">
        <div class="modal-head">
          <span class="modal-title" data-i18n="modal_pattern_delete">パターン削除</span>
          <button class="modal-close" id="patdel-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <p id="patdel-msg"></p>
        </div>
        <div class="modal-footer">
          <button class="addbtn" id="patdel-cancel" data-i18n="btn_cancel">キャンセル</button>
          <button class="pattern-del-btn addbtn" id="patdel-ok" data-i18n="btn_delete">削除</button>
        </div>
      </div>
    </div>

    <!-- Pattern save modal -->
    <div class="modal-bd" id="patsave-modal-bd">
      <div class="modal" style="width:400px;max-height:none">
        <div class="modal-head">
          <span class="modal-title" data-i18n="modal_pattern_save">パターン保存</span>
          <button class="modal-close" id="patsave-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <select id="patsave-mode" class="opt-select patsave-mode-select"></select>
          <div id="patsave-name-row" style="margin-top:8px;display:none">
            <label style="display:block;font-size:13px;color:var(--tx2);margin-bottom:6px" data-i18n="pattern_name_label">パターン名</label>
            <input type="text" id="patsave-name" class="patsave-input" placeholder="パターン名を入力してください" data-i18n-placeholder="pattern_prompt" autocomplete="off">
          </div>
        </div>
        <div class="modal-footer">
          <button class="addbtn" id="patsave-cancel" data-i18n="btn_cancel">キャンセル</button>
          <button class="opt-run-btn" id="patsave-ok" data-i18n="btn_save">保存</button>
        </div>
      </div>
    </div>

    <!-- Manual input modal -->
    <div class="modal-bd" id="manual-modal-bd">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="modal_manual">モジュール手動入力</span>
          <button class="modal-close" id="manual-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="manual-modal-body"></div>
        <div class="modal-footer">
          <button class="addbtn" id="manual-cancel" data-i18n="btn_cancel">キャンセル</button>
          <button class="opt-run-btn" id="manual-add" data-i18n="btn_add">追加</button>
        </div>
      </div>
    </div>

    <!-- Edit module modal -->
    <div class="modal-bd" id="edit-modal-bd">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="modal_edit">モジュール編集</span>
          <button class="modal-close" id="edit-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="edit-modal-body"></div>
        <div class="modal-footer">
          <button class="addbtn pattern-del-btn" id="edit-delete" data-i18n="btn_delete">削除</button>
          <span style="flex:1"></span>
          <button class="addbtn" id="edit-cancel" data-i18n="btn_cancel">キャンセル</button>
          <button class="opt-run-btn" id="edit-save" data-i18n="btn_save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="sb"><span class="sb-dot" id="sb-dot"></span><span id="sb-n">0 モジュール</span></div>
    <div class="sb" id="sb-i"></div>
    <div class="sb" id="sb-progress" style="margin-left:auto;display:none"></div>
  </div>
</div>

<!-- Flyout containers -->
<div class="flyout" id="fly-filter"></div>
<div class="flyout" id="fly-s"></div>
<div class="flyout" id="fly-multi"></div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
