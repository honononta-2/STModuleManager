<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STModuleManager</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div class="app">

  <!-- Title bar -->
  <div class="titlebar" data-tauri-drag-region>
    <button class="menu-btn" id="menu-btn" data-i18n-aria="menu_title" aria-label="メニュー">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
    </button>
    <div class="tab active" data-tab="list" data-i18n="tab_modules">モジュール一覧</div>
    <div class="tab" data-tab="opt" data-i18n="tab_optimize">最適化</div>
    <button class="pin-wrap" id="pin-toggle" type="button">
      <span class="pin-label" data-i18n="topmost">最前面</span>
      <span class="pin-track"><span class="pin-thumb"></span></span>
    </button>
    <div class="titlebar-spacer" data-tauri-drag-region></div>
    <div class="win-controls">
      <button class="win-btn" id="win-minimize" data-i18n-aria="minimize" aria-label="最小化">&#xE921;</button>
      <button class="win-btn win-close" id="win-close" data-i18n-aria="close_btn" aria-label="閉じる">&#xE8BB;</button>
    </div>
  </div>

  <div class="content">

    <!-- List panel -->
    <div class="panel active" id="panel-list">

      <!-- Command bar -->
      <div class="cmdbar">
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="filter_label">絞込</span>
          <button class="opt-multi-btn" id="filter-btn">未選択</button>
          <button class="filter-mode-btn" id="filter-mode">AND</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="sort_label">並び替え</span>
          <div id="schips" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
          <button class="addbtn" id="add-s">＋ Add</button>
        </div>
      </div>

      <!-- Grid -->
      <div class="scroll">
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <!-- Optimize panel -->
    <div class="panel" id="panel-opt">
      <!-- 設定バー -->
      <div class="cmdbar opt-cmdbar">
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="rarity_label">レアリティ</span>
          <select id="opt-quality" class="opt-select">
            <option value="3">紫以上</option>
            <option value="4">金のみ</option>
          </select>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="main_stat">メインステータス</span>
          <button class="opt-multi-btn" id="opt-btn-req">未選択</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="sub_stat">サブステータス</span>
          <button class="opt-multi-btn" id="opt-btn-des">未選択</button>
        </div>
        <div class="cmd-sep"></div>
        <div class="cmd-grp">
          <span class="cmd-lbl" data-i18n="exclude_stat">対象外</span>
          <button class="opt-multi-btn" id="opt-btn-excl">未選択</button>
        </div>
      </div>

      <!-- パターン管理バー -->
      <div class="opt-pattern-bar">
        <span class="cmd-lbl" data-i18n="pattern_label">パターン</span>
        <select id="pattern-select" class="opt-select pattern-select">
          <option value="">-- 選択 --</option>
        </select>
        <button class="addbtn" id="pattern-load" data-i18n="btn_load">読込</button>
        <button class="addbtn" id="pattern-save" data-i18n="btn_save">保存</button>
        <button class="addbtn pattern-del-btn" id="pattern-delete" data-i18n="btn_delete">削除</button>
        <button class="opt-run-btn" id="opt-run" disabled data-i18n="btn_run">最適化実行</button>
      </div>

      <!-- 結果 -->
      <div class="scroll" id="opt-scroll">
        <div class="opt-empty" id="opt-empty">
          <div style="font-size:28px;opacity:0.22">◈</div>
          <div id="opt-empty-text">メインステータスを選択して最適化を実行してください</div>
        </div>
        <div class="opt-results" id="opt-results" style="display:none"></div>
      </div>
    </div>

    <!-- メニューモーダル -->
    <div class="modal-bd" id="menu-modal-bd">
      <div class="modal menu-modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="menu_title">メニュー</span>
          <button class="modal-close" id="menu-modal-close">&times;</button>
        </div>
        <div class="menu-modal-body">
          <div class="menu-section">
            <div class="menu-section-label" data-i18n="menu_export">エクスポート</div>
            <div class="menu-export-btns">
              <button class="menu-export-btn" id="menu-export-json">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
                <span data-i18n="menu_export_json">JSON</span>
              </button>
              <button class="menu-export-btn" id="menu-export-csv">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/></svg>
                <span data-i18n="menu_export_csv">CSV</span>
              </button>
            </div>
          </div>
          <div class="menu-section">
            <div class="menu-section-label" data-i18n="menu_settings">設定</div>
            <div class="menu-row">
              <span class="menu-row-label" data-i18n="menu_auto_monitor">起動時にネットワーク監視を開始</span>
              <button class="menu-toggle" id="menu-toggle-auto-monitor" type="button">
                <span class="menu-toggle-track"><span class="menu-toggle-thumb"></span></span>
              </button>
            </div>
            <div class="menu-row">
              <span class="menu-row-label" data-i18n="menu_theme">テーマ</span>
              <select class="menu-select" id="menu-theme-select">
                <option value="system">システム設定に従う</option>
                <option value="light">ライト</option>
                <option value="dark">ダーク</option>
              </select>
            </div>
            <div class="menu-row">
              <span class="menu-row-label">Language</span>
              <select class="menu-select" id="menu-lang-select">
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="custom">カスタム</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 監視確認モーダル -->
    <div class="modal-bd" id="monitor-confirm-bd">
      <div class="modal monitor-confirm-modal">
        <div class="modal-head">
          <span class="modal-title" data-i18n="monitor_title">ネットワーク監視</span>
          <button class="modal-close" id="monitor-confirm-close">&times;</button>
        </div>
        <div class="modal-body">
          <p class="monitor-confirm-text" data-i18n="monitor_message">次回からアプリ起動時にネットワーク監視を自動的に開始しますか？</p>
          <label class="monitor-confirm-check">
            <input type="checkbox" id="monitor-confirm-hide">
            <span data-i18n="monitor_remember">次回から表示しない（メニューから切替可能です）</span>
          </label>
          <div class="monitor-confirm-actions">
            <button class="monitor-confirm-btn secondary" id="monitor-confirm-no" data-i18n="monitor_no">いいえ</button>
            <button class="monitor-confirm-btn primary" id="monitor-confirm-yes" data-i18n="monitor_yes">はい</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 結果モーダル -->
    <div class="modal-bd" id="modal-bd">
      <div class="modal" id="modal">
        <div class="modal-head">
          <span class="modal-title" id="modal-title">組み合わせ詳細</span>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="sb"><span class="sb-dot" id="sb-dot"></span><span id="sb-n">0 モジュール</span></div>
    <div class="sb" id="sb-i"></div>
    <div class="sb" style="margin-left:auto">
      <button class="cap-wrap" id="cap-toggle" type="button">
        <span class="cap-label" data-i18n="network_label">ネットワーク監視</span>
        <span class="cap-track"><span class="cap-thumb"></span></span>
      </button>
      <span id="sb-monitor"></span>
    </div>
  </div>
</div>

<div class="bd" id="bd"></div>
<div class="flyout" id="fly-f"></div>
<div class="flyout" id="fly-s"></div>
<div class="flyout" id="fly-multi"></div>
<div class="flyout" id="fly-filter"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
