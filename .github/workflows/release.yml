name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Download WinDivert
        run: |
          $url = "https://github.com/basil00/Divert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
          Invoke-WebRequest -Uri $url -OutFile WinDivert.zip
          Expand-Archive -Path WinDivert.zip -DestinationPath WinDivert
        shell: pwsh

      - name: Build Tauri (release)
        run: cargo build --release
        working-directory: src-tauri

      - name: Prepare release files
        run: |
          mkdir release
          copy target\release\STModuleManager.exe release\
          copy WinDivert\WinDivert-2.2.2-A\x64\WinDivert.dll release\
          copy WinDivert\WinDivert-2.2.2-A\x64\WinDivert64.sys release\
        shell: cmd

      - name: Create zip archive
        run: Compress-Archive -Path release\* -DestinationPath "StarResonanceModuleTool-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "StarResonanceModuleTool-${{ github.ref_name }}.zip"
